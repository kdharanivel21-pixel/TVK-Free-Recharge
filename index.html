<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TVK WIN FREE RECHARGE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
overflow-x:hidden;
}

header{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
background:linear-gradient(45deg,#ff0080,#6a00ff,#00f0ff);
animation:bg 8s infinite alternate;
}

@keyframes bg{
0%{filter:hue-rotate(0deg);}
100%{filter:hue-rotate(360deg);}
}

.logo{
width:260px;
border-radius:20px;
box-shadow:0 0 30px cyan;
margin-bottom:25px;
}

h1{
font-size:45px;
text-shadow:0 0 20px cyan;
margin-bottom:15px;
}

p{
font-size:22px;
margin-bottom:30px;
}

button{
padding:15px 40px;
font-size:22px;
border:none;
border-radius:50px;
background:cyan;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.4s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 25px cyan;
}

.image-container{
width:100%;
display:flex;
justify-content:center;
gap:20px;
margin-top:40px;
flex-wrap:wrap;
}

.banner2{
width:45%;
height:300px;
object-fit:cover;
border-radius:20px;
box-shadow:0 0 20px cyan;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}

.popup-box{
background:#111;
padding:30px;
border-radius:20px;
width:90%;
max-width:350px;
text-align:center;
box-shadow:0 0 25px cyan;
}

.popup-box h2{
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:18px;
outline:none;
margin-bottom:15px;
}

.submit{
width:100%;
margin-top:10px;
}

footer{
background:#111;
padding:25px;
text-align:center;
font-size:18px;
}

.creator{
margin-top:10px;
color:cyan;
font-weight:bold;
font-size:20px;
}

@media(max-width:768px){

.banner2{
width:100%;
height:220px;
}

h1{
font-size:32px;
}

p{
font-size:18px;
}

}

</style>
</head>

<body>

<header>

<img class="logo"
src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ2v0eg7xZDTxY-UGGPi_C49YSixAWKVq23iw&s">

<h1>TVK WIN FREE RECHARGE</h1>

<p>Get Free Mobile Recharge Instantly 🔥</p>

<button onclick="openPopup()">
CLAIM NOW
</button>

<div class="image-container">

<img class="banner2"
src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTICMjCNaPJWgUZCfN-3-nleX35cz5p6dm11w&s">

<img class="banner2"
src="https://miro.medium.com/1*1wtEX6WfCrvxYD3jZBvPFQ.png">

</div>

</header>

<div class="popup" id="popup">

<div class="popup-box">

<h2>Enter Details</h2>

<input
type="text"
id="name"
placeholder="Enter Your Name"
>

<input
type="tel"
id="mobile"
maxlength="10"
placeholder="Enter 10 Digit Number"
oninput="this.value=this.value.replace(/[^0-9]/g,'')"
>

<button class="submit" id="submitBtn">
SUBMIT
</button>

</div>

</div>

<footer>

© 2026 TVK Recharge Offer

<div class="creator">
Created By Dharanivel
</div>

</footer>

<script>

// OPEN POPUP

function openPopup(){

document.getElementById("popup").style.display = "flex";

}


// SUBMIT BUTTON

document.getElementById("submitBtn").addEventListener("click", function(){

let name =
document.getElementById("name").value.trim();

let number =
document.getElementById("mobile").value.trim();


// VALIDATION

if(name === ""){

alert("Please Enter Your Name");
return;

}

if(number.length !== 10){

alert("Please Enter Valid 10 Digit Number");
return;

}


// SUCCESS MESSAGE

alert("Successfully Submitted 🔥");


// OPEN YOUTUBE VIDEO IN NEXT PAGE

window.open(
"https://youtube.com/shorts/3yuVsNEQur0?si=4ILZFALPR6CWwvH0",
"_blank"
);


// CLEAR INPUTS

document.getElementById("name").value = "";
document.getElementById("mobile").value = "";


// CLOSE POPUP

document.getElementById("popup").style.display = "none";

});

</script>

</body>
</html>
